<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="'Segoe UI', system-ui, sans-serif">
  <title id="ttl">Tecido conjuntivo: os dois componentes — células e matriz extracelular</title>
  <desc id="desc">Esquema didático mostrando que as células do conjuntivo produzem e ficam imersas na matriz extracelular, composta por fibras e substância fundamental.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a3a4a"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="580" rx="16" fill="#faf7f1"/>
  <rect x="0" y="0" width="900" height="64" rx="16" fill="#ede6f5"/>
  <rect x="0" y="48" width="900" height="16" fill="#ede6f5"/>
  <text x="32" y="41" font-size="24" font-weight="700" fill="#4a2f6b">Tecido conjuntivo — os dois componentes</text>

  <rect x="28" y="92" width="368" height="288" rx="12" fill="#ffffff" stroke="#c9b8e0" stroke-width="2"/>
  <text x="48" y="126" font-size="17" font-weight="700" fill="#6b4a8a">1 · CÉLULAS</text>
  <text x="48" y="150" font-size="13.5" fill="#555">Poucas, dispersas. Fabricam e mantêm a matriz.</text>
  <g transform="translate(120,225)">
    <path d="M-58,0 Q-30,-34 0,-16 Q34,-40 66,-6 Q40,30 0,20 Q-34,34 -58,0 Z" fill="#d9c2f0" stroke="#8a63b5" stroke-width="2"/>
    <ellipse cx="4" cy="0" rx="17" ry="12" fill="#6b4a8a"/>
    <text x="4" y="52" font-size="12.5" fill="#3a3a4a" text-anchor="middle">fibroblasto</text>
    <text x="4" y="68" font-size="11" fill="#777" text-anchor="middle">(produz fibras + subst.)</text>
  </g>
  <g transform="translate(300,205)">
    <circle r="34" fill="#fdf3d6" stroke="#d8b24a" stroke-width="2"/>
    <circle cx="10" cy="10" r="9" fill="#e9c96a"/>
    <text x="0" y="52" font-size="12.5" fill="#3a3a4a" text-anchor="middle">adipócito</text>
  </g>
  <g transform="translate(140,330)">
    <path d="M-26,-20 q-10,-6 -4,6 q-14,-2 -6,10 q-10,8 4,10 q2,14 12,6 q8,12 16,0 q14,4 10,-10 q10,-8 -2,-14 q0,-14 -12,-8 q-8,-10 -12,4 Z" fill="#cfe0d6" stroke="#4a8a6b" stroke-width="1.8"/>
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#3a6b52"/>
    <text x="0" y="44" font-size="12.5" fill="#3a3a4a" text-anchor="middle">macrófago</text>
  </g>
  <g transform="translate(300,320)">
    <circle r="24" fill="#f6d6de" stroke="#c56a82" stroke-width="2"/>
    <circle cx="-8" cy="-6" r="3.5" fill="#a33a5a"/><circle cx="6" cy="-9" r="3.5" fill="#a33a5a"/><circle cx="10" cy="4" r="3.5" fill="#a33a5a"/><circle cx="-4" cy="8" r="3.5" fill="#a33a5a"/><circle cx="-11" cy="2" r="3.5" fill="#a33a5a"/>
    <text x="0" y="42" font-size="12.5" fill="#3a3a4a" text-anchor="middle">mastócito</text>
  </g>

  <line x1="404" y1="236" x2="496" y2="236" stroke="#3a3a4a" stroke-width="2.4" marker-end="url(#ar)"/>
  <rect x="410" y="210" width="80" height="22" rx="11" fill="#4a2f6b"/>
  <text x="450" y="225" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">produzem</text>

  <rect x="504" y="92" width="368" height="288" rx="12" fill="#ffffff" stroke="#9ecfd0" stroke-width="2"/>
  <text x="524" y="126" font-size="17" font-weight="700" fill="#2c7a7b">2 · MATRIZ EXTRACELULAR</text>
  <text x="524" y="150" font-size="13.5" fill="#555">A protagonista. Ocupa quase todo o espaço.</text>
  <path d="M524,186 q30,-12 60,0 q30,12 60,0 q30,-12 60,0 q30,12 60,0 q30,-12 60,0" fill="none" stroke="#d98a9a" stroke-width="6" stroke-linecap="round"/>
  <path d="M524,204 q30,-12 60,0 q30,12 60,0 q30,-12 60,0 q30,12 60,0 q30,-12 60,0" fill="none" stroke="#e0a0ae" stroke-width="6" stroke-linecap="round"/>
  <text x="524" y="232" font-size="12.5" fill="#b0546c">fibras colágenas — resistência à tração</text>
  <path d="M524,258 q15,-14 30,0 q15,14 30,0 q15,-14 30,0 q15,14 30,0 q15,-14 30,0 q15,14 30,0 q15,-14 30,0" fill="none" stroke="#5aa06a" stroke-width="2.4"/>
  <text x="524" y="284" font-size="12.5" fill="#3a7a4a">fibras elásticas — recuo após estiramento</text>
  <rect x="524" y="300" width="328" height="58" rx="10" fill="#e7f4f4" stroke="#9ecfd0" stroke-width="1.5"/>
  <text x="540" y="322" font-size="12.5" font-weight="700" fill="#2c7a7b">substância fundamental</text>
  <text x="540" y="342" font-size="11.5" fill="#4a6a6a">gel de água + glicosaminoglicanos — meio de difusão e amortecimento</text>

  <rect x="28" y="398" width="844" height="60" rx="12" fill="#4a2f6b"/>
  <text x="52" y="424" font-size="15" font-weight="700" fill="#fff">Ideia central</text>
  <text x="52" y="446" font-size="13.5" fill="#e9defa">No conjuntivo, a protagonista é a MATRIZ (não as células) — o inverso do epitélio, onde as células justapostas são tudo.</text>

  <rect x="28" y="474" width="844" height="72" rx="12" fill="#fdf3d6" stroke="#d8b24a" stroke-width="1.5"/>
  <text x="52" y="500" font-size="14" font-weight="700" fill="#8a6a1a">⚠ Cai na prova</text>
  <text x="52" y="522" font-size="12.8" fill="#5a4a1a">• Quem produz colágeno e substância fundamental é o fibroblasto.</text>
  <text x="52" y="540" font-size="12.8" fill="#5a4a1a">• Diferenciar frouxo × denso = quantidade e organização das fibras colágenas na matriz.</text>
</svg>
